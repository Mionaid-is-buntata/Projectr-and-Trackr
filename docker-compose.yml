services:
  projctr:
    container_name: projctr
    build: .
    ports:
      # Bind explicitly — if host mapping is empty after `up`, run `docker compose down && up -d`
      - "0.0.0.0:8090:8090"
    environment:
      CONFIG_PATH: /app/config.docker.toml
      HUNTR_JOBS_PATH: /data/jobs/scored
      # Docker DNS name for the qdrant service (localhost inside the container is wrong)
      QDRANT_HOST: qdrant
    volumes:
      - projctr_data:/data
      - /mnt/nas/huntr-data/jobs/scored:/data/jobs/scored:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Projctr tolerates Qdrant down at runtime; do not block on health (emulated amd64 Qdrant
    # on Pi can take many minutes; requiring both 6333+6334 in one check caused perpetual unhealthy).
    depends_on:
      qdrant:
        condition: service_started
    restart: unless-stopped

  # Native arm64 Qdrant images can crash with "<jemalloc>: Unsupported system page size"
  # on hosts with non-4K pages (e.g. 16K ARM). linux/amd64 runs under emulation but is stable.
  qdrant:
    container_name: qdrant
    image: qdrant/qdrant:v1.12.4
    platform: linux/amd64
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    # Image has no curl/wget; bash /dev/tcp. Check REST only — gRPC may bind later; Projctr retries gRPC.
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/6333"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 300s
    restart: unless-stopped

volumes:
  projctr_data:
  qdrant_data:
