services:
  projctr:
    build: .
    ports:
      # Bind explicitly — if host mapping is empty after `up`, run `docker compose down && up -d`
      - "0.0.0.0:8090:8090"
    environment:
      CONFIG_PATH: /app/config.docker.toml
      HUNTR_JOBS_PATH: /data/jobs/scored
      # Docker DNS name for the qdrant service (localhost inside the container is wrong)
      QDRANT_HOST: qdrant
    volumes:
      - projctr_data:/data
      - ./testdata/jobs/scored:/data/jobs/scored:ro
    depends_on:
      - qdrant
    restart: unless-stopped

  # Native arm64 Qdrant images can crash with "<jemalloc>: Unsupported system page size"
  # on hosts with non-4K pages (e.g. 16K ARM). linux/amd64 runs under emulation but is stable.
  qdrant:
    image: qdrant/qdrant:v1.12.4
    platform: linux/amd64
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  projctr_data:
  qdrant_data:
