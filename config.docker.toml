# Docker Compose defaults — copied into the image at /app/config.docker.toml
# Override paths/hosts via environment (see internal/config/config.go).

[server]
port = "8090"
host = "0.0.0.0"

[database]
path = "/data/projctr.db"

[huntr]
jobs_path  = "/data/jobs/scored"
score_min  = 0
score_max  = 300

[chromadb]
url        = "http://localhost:8000"
collection = "your-cv-collection-name"

[qdrant]
# Service name from docker-compose.yml (not localhost)
host                   = "qdrant"
port                   = 6334
collection             = "projctr"
description_collection = "projctr_descriptions"
vector_dimensions      = 384

[embedding]
model    = "all-minilm:l6-v2"
endpoint = "http://host.docker.internal:11434/api/embeddings"

[extraction]
mode            = "rules"
tech_dictionary = "./config/tech-dict.toml"

[extraction.llm]
enabled  = false
endpoint = "http://host.docker.internal:11434"
model    = "mistral:latest"

[clustering]
min_cluster_size     = 3
similarity_threshold = 0.65

[ingestion]
schedule = ""
time     = "02:00"

[trackr]
enabled = true

[trackr.llm]
endpoint = "http://host.docker.internal:11434"
model    = "mistral:latest"
