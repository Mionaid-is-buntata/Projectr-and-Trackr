# Technology Keyword Dictionary
#
# Version: 1.0
# Date: 19 February 2026
#
# Used by the rule-based extraction service (internal/extraction/rules.go)
# to identify and normalise technology mentions in job descriptions.
#
# Structure:
#   Each entry maps one or more raw variants to a canonical name and category.
#   Variants are matched case-insensitively against description text.
#   Add new entries as they are discovered from real Huntr descriptions.
#
# Categories:
#   language    - programming/scripting languages
#   framework   - application frameworks and libraries
#   platform    - cloud platforms, operating systems, infrastructure
#   tool        - standalone tools and utilities
#   database    - databases and data stores
#   methodology - practices, patterns, and methodologies

